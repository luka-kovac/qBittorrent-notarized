name: CI - macOS

on: [pull_request, push, workflow_dispatch]

permissions:
  contents: write
  statuses: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.head_ref != '' }}

jobs:
  ci:
    name: Build
    runs-on: macos-latest
    permissions:
      actions: write

    strategy:
      fail-fast: false
      matrix:
        libtorrent:
          - version: "2.1.0-rc1"
            boost_major_version: "1"
            boost_minor_version: "91"
            boost_patch_version: "0"
          - version: "2.0.12"
            boost_major_version: "1"
            boost_minor_version: "91"
            boost_patch_version: "0"
          - version: "1.2.20"
            boost_major_version: "1"
            boost_minor_version: "86"
            boost_patch_version: "0"
        qbt_gui: ["GUI=ON", "GUI=OFF"]
        qt_version: ["6.10.3"]

    env:
      boost_path: "${{ github.workspace }}/../boost"
      libtorrent_path: "${{ github.workspace }}/../libtorrent"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Extract qBittorrent Version from Header
        id: qbt_version
        run: |
          VERSION_FILE="src/base/version.h.in"
          
          # Extract major, minor, and bugfix components using awk
          MAJOR=$(awk '/#define QBT_VERSION_MAJOR/ {print $3}' $VERSION_FILE)
          MINOR=$(awk '/#define QBT_VERSION_MINOR/ {print $3}' $VERSION_FILE)
          BUGFIX=$(awk '/#define QBT_VERSION_BUGFIX/ {print $3}' $VERSION_FILE)
          STATUS=$(awk '/#define QBT_VERSION_STATUS/ {print $3}' $VERSION_FILE | tr -d '"')

          # Construct the clean version string
          # If STATUS is not empty (e.g., "beta1"), append it with a hyphen
          if [ -n "$STATUS" ]; then
            FULL_VERSION="${MAJOR}.${MINOR}.${BUGFIX}-${STATUS}"
          else
            FULL_VERSION="${MAJOR}.${MINOR}.${BUGFIX}"
          fi

          echo "Detected qBittorrent Version from source: v$FULL_VERSION"
          
          # Save it cleanly to GitHub outputs
          echo "version=v$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        uses: nick-fields/retry@v4
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        with:
          timeout_seconds: 90
          retry_wait_seconds: 20
          max_attempts: 6
          command: |
            brew update > /dev/null
            brew install \
              openssl@3 zlib
            # preinstalled on the image: cmake ninja

      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
          store_cache: ${{ (github.repository != 'qbittorrent/qBittorrent') || (github.ref == 'refs/heads/master') }}
          update_packager_index: false
          ccache_options: |
            max_size=1G

      - name: Install boost
        run: |
          boost_url="https://archives.boost.io/release/${{ matrix.libtorrent.boost_major_version }}.${{ matrix.libtorrent.boost_minor_version }}.${{ matrix.libtorrent.boost_patch_version }}/source/boost_${{ matrix.libtorrent.boost_major_version }}_${{ matrix.libtorrent.boost_minor_version }}_${{ matrix.libtorrent.boost_patch_version }}.tar.gz"
          boost_url2="https://sourceforge.net/projects/boost/files/boost/${{ matrix.libtorrent.boost_major_version }}.${{ matrix.libtorrent.boost_minor_version }}.${{ matrix.libtorrent.boost_patch_version }}/boost_${{ matrix.libtorrent.boost_major_version }}_${{ matrix.libtorrent.boost_minor_version }}_${{ matrix.libtorrent.boost_patch_version }}.tar.gz"
          set +e
          curl -L -o "${{ runner.temp }}/boost.tar.gz" "$boost_url"
          tar -xf "${{ runner.temp }}/boost.tar.gz" -C "${{ github.workspace }}/.."; _exitCode="$?"
          if [ "$_exitCode" -ne "0" ]; then
            curl -L -o "${{ runner.temp }}/boost.tar.gz" "$boost_url2"
            tar -xf "${{ runner.temp }}/boost.tar.gz" -C "${{ github.workspace }}/.."; _exitCode="$?"
          fi
          mv "${{ github.workspace }}/.."/boost_* "${{ env.boost_path }}"
          cd "${{ env.boost_path }}"
          ./bootstrap.sh
          ./b2 stage --stagedir=./ --with-headers

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          archives: qtbase qtdeclarative qtsvg qttools
          modules: qtimageformats
          # Not sure why Qt made a hard dependency on qtdeclarative, try removing it when Qt > 6.4.0
          cache: true

      - name: Install libtorrent
        run: |
          git clone \
            --branch v${{ matrix.libtorrent.version }} \
            --depth 1 \
            --recurse-submodules \
            https://github.com/arvidn/libtorrent.git \
            ${{ env.libtorrent_path }}
          cd ${{ env.libtorrent_path }}
          cmake \
            -B build \
            -G "Ninja" \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBOOST_ROOT="${{ env.boost_path }}/lib/cmake" \
            -Ddeprecated-functions=OFF
          cmake --build build
          sudo cmake --install build

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 1. Decode the base64 string
          # Using standard formatting flags to avoid hidden newline wrapping errors
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH

          # 2. Re-verify the file actually decoded as a valid P12
          if [ ! -s "$CERTIFICATE_PATH" ]; then
            echo "ERROR: Decoded certificate file is empty! Check your Base64 secret format."
            exit 1
          fi

          # 3. Build and unlock the keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 4. Import the .p12 certificate
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          
          # 5. FIX: Make our custom keychain the temporary System Default search location
          security default-keychain -s $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 6. DIAGNOSTIC PRINT: Show exactly what identities codesign can see right now
          echo "=== AVAILABLE SIGNING IDENTITIES IN CI RUNNER ==="
          security find-identity -v -p codesigning
          echo "================================================"
          
      - name: Build qBittorrent
        run: |
          CXXFLAGS="$CXXFLAGS -DQT_FORCE_ASSERTS -Werror -Wno-error=deprecated-declarations" \
          LDFLAGS="$LDFLAGS -gz" \
          cmake \
            -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBOOST_ROOT="${{ env.boost_path }}/lib/cmake" \
            -DTESTING=ON \
            -DVERBOSE_CONFIGURE=ON \
            -D${{ matrix.qbt_gui }}
          cmake --build build --target qbt_update_translations
          cmake --build build
          cmake --build build --target check
          if [ "${{ matrix.qbt_gui }}" = "GUI=ON" ]; then
            build/qbittorrent.app/Contents/MacOS/qbittorrent -v
          else
            build/qbittorrent-nox.app/Contents/MacOS/qbittorrent-nox -v
          fi
          
      - name: Prepare, Sign, and Notarize build artifacts
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          DEVELOPER_NAME: ${{ secrets.DEVELOPER_NAME }}
        run: |
          appName="qbittorrent"
          if [ "${{ matrix.qbt_gui }}" = "GUI=OFF" ]; then
            appName="qbittorrent-nox"
          fi

          pushd build

          # 1. Run deployment tool (ignoring non-critical plugin errors)
          macdeployqt "$appName.app" -no-strip || true

          # 2. CRITICAL CLEANUP: Remove broken or unnecessary SQL plugins that break layout rules
          if [ -d "$appName.app/Contents/PlugIns/sqldrivers" ]; then
            echo "Removing optional SQL plugins that failed deep deployment linking..."
            rm -rf "$appName.app/Contents/PlugIns/sqldrivers"
          fi

          # 3. CRITICAL SYMCONSTRUCT: Fix unlinked Framework structures left over by macdeployqt
          echo "Repairing internal framework nested symlinks..."
          if [ -d "$appName.app/Contents/Frameworks" ]; then
            for framework in "$appName.app/Contents/Frameworks"/*.framework; do
              if [ -d "$framework" ]; then
                fw_name=$(basename "$framework" .framework)
                # Ensure Versions/Current exists or symlinks correctly to Versions/A
                if [ -d "$framework/Versions/A" ] && [ ! -L "$framework/Versions/Current" ] && [ ! -d "$framework/Versions/Current" ]; then
                  ln -s A "$framework/Versions/Current"
                fi
                # Re-link root headers/binaries if missing
                [ ! -L "$framework/$fw_name" ] && [ -f "$framework/Versions/Current/$fw_name" ] && ln -s "Versions/Current/$fw_name" "$framework/$fw_name"
                [ ! -L "$framework/Resources" ] && [ -d "$framework/Versions/Current/Resources" ] && ln -s "Versions/Current/Resources" "$framework/Resources"
              fi
            done
          fi

          # 4. Clear extended filesystem attributes that block validation
          xattr -cr "$appName.app"

          echo "Starting recursive deep signing using identity..."
          SIGN_IDENTITY="Developer ID Application: $DEVELOPER_NAME ($TEAM_ID)"
          echo "Target Identity: $SIGN_IDENTITY"
          
          # 5. Sign embedded components cleanly using our fixed string matching variable
          if [ -d "$appName.app/Contents/PlugIns" ]; then
            find "$appName.app/Contents/PlugIns" -type f \( -name "*.dylib" -o -perm +111 \) -exec codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" {} \;
          fi

          if [ -d "$appName.app/Contents/Frameworks" ]; then
            # We sign frameworks deeply from inner sub-binaries outward
            find "$appName.app/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.framework" -o -perm +111 \) -exec codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" {} \;
          fi

          # 6. Sign primary executable and container wrapper
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$appName.app/Contents/MacOS/$appName"
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$appName.app"

          # 7. Verify structural integrity definitively
          echo "Verifying signature structure..."
          codesign --verify --deep --strict -v "$appName.app"

          # 8. Package zip file for Apple Notary submission
          echo "Packaging zip file for Apple Notary submission..."
          ditto -c -k --keepParent "$appName.app" "$appName.zip"

          # 9. Submit to Apple Notary Service
          echo "Submitting to Apple Notary..."
          xcrun notarytool submit "$appName.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          # 10. Staple the approved ticket back onto the app
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$appName.app"

          # 11. Create the final distributed disk image (.dmg)
          echo "Generating final distribution DMG..."
          hdiutil create -fs HFS+ -srcfolder "$appName.app" -volname "$appName" "$appName.dmg"

          popd

          # Prepare upload folder artifact
          mkdir upload
          cp "build/$appName.dmg" upload
          mkdir upload/cmake
          cp build/compile_commands.json upload/cmake
          mkdir upload/cmake/libtorrent
          cp ${{ env.libtorrent_path }}/build/compile_commands.json upload/cmake/libtorrent
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: qBittorrent-CI_macOS_${{ matrix.qbt_gui }}_libtorrent-${{ matrix.libtorrent.version }}_Qt-${{ matrix.qt_version }}
          path: upload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # This pulls the parsed version from the step above (e.g., v5.2.1-build14)
          tag_name: ${{ steps.qbt_version.outputs.version }}-build${{ github.run_number }}
          name: "qBittorrent Notarized ${{ steps.qbt_version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            Automated custom notarized build of qBittorrent, not affiliated with the main project.
            
            - **Source Code Version:** ${{ steps.qbt_version.outputs.version }}
            - **Status:** Fully signed with Developer ID and Notarized by Apple.
          draft: false
          prerelease: false
          files: |
            build/*.dmg




