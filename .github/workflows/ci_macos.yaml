name: CI - macOS

on: [pull_request, push, workflow_dispatch]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.head_ref != '' }}

jobs:
  ci:
    name: Build
    runs-on: macos-latest
    permissions:
      actions: write

    strategy:
      fail-fast: false
      matrix:
        libtorrent:
          - version: "2.1.0-rc1"
            boost_major_version: "1"
            boost_minor_version: "91"
            boost_patch_version: "0"
          - version: "2.0.12"
            boost_major_version: "1"
            boost_minor_version: "91"
            boost_patch_version: "0"
          - version: "1.2.20"
            boost_major_version: "1"
            boost_minor_version: "86"
            boost_patch_version: "0"
        qbt_gui: ["GUI=ON", "GUI=OFF"]
        qt_version: ["6.10.3"]

    env:
      boost_path: "${{ github.workspace }}/../boost"
      libtorrent_path: "${{ github.workspace }}/../libtorrent"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: nick-fields/retry@v4
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        with:
          timeout_seconds: 90
          retry_wait_seconds: 20
          max_attempts: 6
          command: |
            brew update > /dev/null
            brew install \
              openssl@3 zlib
            # preinstalled on the image: cmake ninja

      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
          store_cache: ${{ (github.repository != 'qbittorrent/qBittorrent') || (github.ref == 'refs/heads/master') }}
          update_packager_index: false
          ccache_options: |
            max_size=1G

      - name: Install boost
        run: |
          boost_url="https://archives.boost.io/release/${{ matrix.libtorrent.boost_major_version }}.${{ matrix.libtorrent.boost_minor_version }}.${{ matrix.libtorrent.boost_patch_version }}/source/boost_${{ matrix.libtorrent.boost_major_version }}_${{ matrix.libtorrent.boost_minor_version }}_${{ matrix.libtorrent.boost_patch_version }}.tar.gz"
          boost_url2="https://sourceforge.net/projects/boost/files/boost/${{ matrix.libtorrent.boost_major_version }}.${{ matrix.libtorrent.boost_minor_version }}.${{ matrix.libtorrent.boost_patch_version }}/boost_${{ matrix.libtorrent.boost_major_version }}_${{ matrix.libtorrent.boost_minor_version }}_${{ matrix.libtorrent.boost_patch_version }}.tar.gz"
          set +e
          curl -L -o "${{ runner.temp }}/boost.tar.gz" "$boost_url"
          tar -xf "${{ runner.temp }}/boost.tar.gz" -C "${{ github.workspace }}/.."; _exitCode="$?"
          if [ "$_exitCode" -ne "0" ]; then
            curl -L -o "${{ runner.temp }}/boost.tar.gz" "$boost_url2"
            tar -xf "${{ runner.temp }}/boost.tar.gz" -C "${{ github.workspace }}/.."; _exitCode="$?"
          fi
          mv "${{ github.workspace }}/.."/boost_* "${{ env.boost_path }}"
          cd "${{ env.boost_path }}"
          ./bootstrap.sh
          ./b2 stage --stagedir=./ --with-headers

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          archives: qtbase qtdeclarative qtsvg qttools
          modules: qtimageformats
          # Not sure why Qt made a hard dependency on qtdeclarative, try removing it when Qt > 6.4.0
          cache: true

      - name: Install libtorrent
        run: |
          git clone \
            --branch v${{ matrix.libtorrent.version }} \
            --depth 1 \
            --recurse-submodules \
            https://github.com/arvidn/libtorrent.git \
            ${{ env.libtorrent_path }}
          cd ${{ env.libtorrent_path }}
          cmake \
            -B build \
            -G "Ninja" \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBOOST_ROOT="${{ env.boost_path }}/lib/cmake" \
            -Ddeprecated-functions=OFF
          cmake --build build
          sudo cmake --install build

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode base64 string
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create custom runner keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import .p12 distribution file
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          
          # Map both temporary and existing system keychains into bounds
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          
          # Remove UI execution prompt gate locks
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build qBittorrent
        run: |
          CXXFLAGS="$CXXFLAGS -DQT_FORCE_ASSERTS -Werror -Wno-error=deprecated-declarations" \
          LDFLAGS="$LDFLAGS -gz" \
          cmake \
            -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBOOST_ROOT="${{ env.boost_path }}/lib/cmake" \
            -DTESTING=ON \
            -DVERBOSE_CONFIGURE=ON \
            -D${{ matrix.qbt_gui }}
          cmake --build build --target qbt_update_translations
          cmake --build build
          cmake --build build --target check
          if [ "${{ matrix.qbt_gui }}" = "GUI=ON" ]; then
            build/qbittorrent.app/Contents/MacOS/qbittorrent -v
          else
            build/qbittorrent-nox.app/Contents/MacOS/qbittorrent-nox -v
          fi
          
      - name: Prepare, Sign, and Notarize build artifacts
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          DEVELOPER_NAME: ${{ secrets.DEVELOPER_NAME }}
        run: |
          appName="qbittorrent"
          if [ "${{ matrix.qbt_gui }}" = "GUI=OFF" ]; then
            appName="qbittorrent-nox"
          fi

          pushd build

          # 1. Package the frameworks natively with Qt's deploy tool
          macdeployqt "$appName.app" -no-strip

          # Clear extended attributes that break signatures
          xattr -cr "$appName.app"

          echo "Starting recursive deep signing for Qt apps..."
          
          # 2. Sign embedded items from the inside out (Crucial for Qt bundles)
          # Sign plugins
          if [ -d "$appName.app/Contents/PlugIns" ]; then
            find "$appName.app/Contents/PlugIns" -type f \( -name "*.dylib" -o -perm +111 \) -exec codesign --force --options runtime --timestamp --sign "Developer ID Application: Your Name ($TEAM_ID)" {} \;
          fi

          # Sign libraries/frameworks
          if [ -d "$appName.app/Contents/Frameworks" ]; then
            find "$appName.app/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.framework" -o -perm +111 \) -exec codesign --force --options runtime --timestamp --sign "Developer ID Application: Your Name ($TEAM_ID)" {} \;
          fi

          # 3. Sign the primary executable and main bundle wrapper
          codesign --force --options runtime --timestamp --sign "Developer ID Application: $DEVELOPER_NAME ($TEAM_ID)" "$appName.app/Contents/MacOS/$appName"
          codesign --force --options runtime --timestamp --sign "Developer ID Application: $DEVELOPER_NAME ($TEAM_ID)" "$appName.app"

          # Verify structural integrity
          codesign --verify --deep --strict -v "$appName.app"

          # 4. Package into a zip archive strictly for Notarization delivery
          echo "Packaging zip file for Apple Notary submission..."
          ditto -c -k --keepParent "$appName.app" "$appName.zip"

          # 5. Submit to Apple Notary Service
          echo "Submitting to Apple Notary..."
          xcrun notarytool submit "$appName.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          # 6. Staple the approved notarization ticket back onto the local app structure
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$appName.app"

          # 7. Create the final distributed disk image (.dmg) containing the stapled app
          echo "Generating final distribution DMG..."
          PACKAGE_RETRY=0
          while [ "$PACKAGE_RETRY" -lt "3" ]; do
            if hdiutil create -fs HFS+ -srcfolder "$appName.app" -volname "$appName" "$appName.dmg"; then
              break
            fi
            sleep 5
            PACKAGE_RETRY=$((PACKAGE_RETRY + 1))
            echo "Retry $PACKAGE_RETRY..."
          done

          popd

          # Prepare upload folder for the final step to capture
          mkdir upload
          cp "build/$appName.dmg" upload
          mkdir upload/cmake
          cp build/compile_commands.json upload/cmake
          mkdir upload/cmake/libtorrent
          cp ${{ env.libtorrent_path }}/build/compile_commands.json upload/cmake/libtorrent
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: qBittorrent-CI_macOS_${{ matrix.qbt_gui }}_libtorrent-${{ matrix.libtorrent.version }}_Qt-${{ matrix.qt_version }}
          path: upload
